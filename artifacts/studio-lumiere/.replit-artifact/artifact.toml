kind = "web"
previewPath = "/"
title = "Studio Lumière"
version = "1.0.0"
id = "artifacts/studio-lumiere"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19953

[services.development]
run = "pnpm --filter @workspace/studio-lumiere run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/studio-lumiere", "run", "build" ]
publicDir = "artifacts/studio-lumiere/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19953"
BASE_PATH = "/"
